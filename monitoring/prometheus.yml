# Prometheus Configuration for Fraud Detection Pipeline
# Place this file in: ./monitoring/prometheus.yml

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

# Alertmanager configuration (optional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

# Rule files (optional)
# rule_files:
#   - "alerts.yml"

scrape_configs:
  # ========================================================================
  # FRAUD DETECTION COMPONENTS
  # ========================================================================
  
  # Detector component (port 8001)
  - job_name: 'fraud-detector'
    static_configs:
      - targets: ['host.docker.internal:8001']
        labels:
          component: 'detector'
          environment: 'production'
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Stats Updater component (port 8002)
  - job_name: 'fraud-stats-updater'
    static_configs:
      - targets: ['host.docker.internal:8002']
        labels:
          component: 'stats_updater'
          environment: 'production'
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Feedback component (port 8003)
  - job_name: 'fraud-feedback'
    static_configs:
      - targets: ['host.docker.internal:8003']
        labels:
          component: 'feedback'
          environment: 'production'
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Report Generator component (port 8004)
  - job_name: 'fraud-report-generator'
    static_configs:
      - targets: ['host.docker.internal:8004']
        labels:
          component: 'report_generator'
          environment: 'production'
    metrics_path: '/metrics'
    scrape_interval: 10s

  # ========================================================================
  # INFRASTRUCTURE MONITORING
  # ========================================================================
  
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          component: 'prometheus'

  # Redis metrics via Redis Exporter
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          component: 'redis'
          database: 'fraud-stats'

  # NATS monitoring endpoint
  - job_name: 'nats'
    static_configs:
      - targets: ['nats:8222']
        labels:
          component: 'nats'
          messaging: 'jetstream'
    metrics_path: '/varz'
    scrape_interval: 15s

  # System metrics via Node Exporter
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          component: 'system'
          node: 'fraud-pipeline'

  # ========================================================================
  # SERVICE DISCOVERY (Optional - for dynamic environments)
  # ========================================================================
  
  # Uncomment if running in Docker Swarm
  # - job_name: 'docker-swarm'
  #   dockerswarm_sd_configs:
  #     - host: unix:///var/run/docker.sock
  #       role: tasks
  #   relabel_configs:
  #     - source_labels: [__meta_dockerswarm_service_label_monitoring]
  #       action: keep
  #       regex: true

  # Uncomment if running in Kubernetes
  # - job_name: 'kubernetes-pods'
  #   kubernetes_sd_configs:
  #     - role: pod
  #   relabel_configs:
  #     - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
